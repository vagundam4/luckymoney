<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lì Xì May Mắn 🧧</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E;
    --red-dark: #8B0000;
    --gold: #FFD700;
    --gold-light: #FFF0A0;
    --gold-dark: #B8860B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    background: var(--red-dark);
    font-family: 'Be Vietnam Pro', sans-serif;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(200,16,46,0.6) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(255,215,0,0.08) 0%, transparent 40%),
      radial-gradient(circle at 50% 80%, rgba(139,0,0,0.8) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  /* Lanterns */
  .lanterns {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-around;
    padding: 0 5%; z-index: 1; pointer-events: none;
  }
  .lantern { display: flex; flex-direction: column; align-items: center; animation: sway 3s ease-in-out infinite; }
  .lantern:nth-child(2) { animation-delay: -1s; }
  .lantern:nth-child(3) { animation-delay: -2s; }
  @keyframes sway {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }
  .lantern-string { width: 2px; height: 40px; background: var(--gold-dark); }
  .lantern-body {
    width: 36px; height: 52px;
    background: radial-gradient(ellipse at 40% 35%, #ff6b6b, var(--red), var(--red-dark));
    border-radius: 50% 50% 45% 45%; position: relative;
    box-shadow: 0 0 20px rgba(255,100,100,0.5), inset 0 0 10px rgba(255,200,0,0.3);
    border: 1px solid rgba(255,215,0,0.4);
  }
  .lantern-body::before, .lantern-body::after {
    content: ''; position: absolute; left: -4px; right: -4px;
    height: 6px; background: var(--gold-dark); border-radius: 3px;
  }
  .lantern-body::before { top: 4px; }
  .lantern-body::after { bottom: 4px; }
  .lantern-tassel { width: 2px; height: 20px; background: var(--gold); position: relative; }
  .lantern-tassel::after {
    content: '●'; color: var(--gold); font-size: 8px;
    position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
  }

  /* Petals */
  .petal {
    position: fixed; font-size: 16px; opacity: 0;
    animation: fall linear infinite; z-index: 1; pointer-events: none;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }

  /* Container */
  .container {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 100px 20px 48px;
    gap: 28px;
    width: 100%;
  }

  .title-block { text-align: center; }
  .title-sub {
    font-size: 13px; font-weight: 600; letter-spacing: 6px;
    text-transform: uppercase; color: var(--gold); opacity: 0.8; margin-bottom: 8px;
  }
  .title-main {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(36px, 8vw, 64px); font-weight: 900; color: var(--gold);
    text-shadow: 0 0 30px rgba(255,215,0,0.6), 0 2px 0 var(--gold-dark), 0 4px 0 rgba(0,0,0,0.3);
    line-height: 1.1; letter-spacing: 4px;
  }
  .title-main span { display: inline-block; animation: titlePulse 2.5s ease-in-out infinite; }
  .title-main span:nth-child(2) { animation-delay: 0.3s; }
  .title-main span:nth-child(3) { animation-delay: 0.6s; }
  .title-main span:nth-child(4) { animation-delay: 0.9s; }
  @keyframes titlePulse {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  /* Envelope */
  .envelope-wrap { perspective: 1000px; cursor: pointer; }
  .envelope {
    width: min(320px, 85vw); height: min(220px, 58vw);
    position: relative; transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .envelope:hover { transform: scale(1.03) rotateY(3deg); }
  .envelope.shake { animation: shake 0.5s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0) scale(1.03); }
    20% { transform: translateX(-8px) scale(1.03); }
    40% { transform: translateX(8px) scale(1.03); }
    60% { transform: translateX(-5px) scale(1.03); }
    80% { transform: translateX(5px) scale(1.03); }
  }
  .envelope-front {
    position: absolute; inset: 0;
    background: linear-gradient(145deg, #E8314A, var(--red), #9B0020);
    border-radius: 12px; border: 2px solid rgba(255,215,0,0.5);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .envelope-front::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 12px, rgba(255,215,0,0.04) 12px, rgba(255,215,0,0.04) 13px);
  }
  .env-corner { position: absolute; width: 40px; height: 40px; border-color: rgba(255,215,0,0.6); border-style: solid; }
  .env-corner.tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .env-corner.tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .env-corner.bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .env-corner.br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }
  .envelope-symbol {
    font-family: 'Noto Serif SC', serif; font-size: 72px;
    color: rgba(255,215,0,0.9); text-shadow: 0 0 20px rgba(255,215,0,0.4);
    z-index: 1; user-select: none; transition: transform 0.3s;
  }
  .envelope:hover .envelope-symbol { transform: scale(1.1); }

  /* Result */
  .result-wrap {
    text-align: center; min-height: 120px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px; width: 100%;
  }
  .result-label {
    font-size: 13px; font-weight: 600; letter-spacing: 3px;
    text-transform: uppercase; color: rgba(255,215,0,0.6);
    opacity: 0; transition: opacity 0.4s;
  }
  .result-label.show { opacity: 1; }
  .result-number {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(48px, 15vw, 96px); font-weight: 900;
    color: var(--gold); line-height: 1;
    text-shadow: 0 0 40px rgba(255,215,0,0.7), 0 3px 0 var(--gold-dark), 0 6px 0 rgba(0,0,0,0.3);
    opacity: 0; transform: scale(0.5);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .result-number.show { opacity: 1; transform: scale(1); }
  .result-rolling {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(48px, 15vw, 96px); font-weight: 900;
    color: rgba(255,215,0,0.4); display: none; font-variant-numeric: tabular-nums;
  }
  .result-rolling.active { display: block; }
  .result-message {
    font-size: 16px; color: rgba(255,255,255,0.7);
    opacity: 0; transform: translateY(8px);
    transition: all 0.4s 0.3s; font-weight: 500;
  }
  .result-message.show { opacity: 1; transform: translateY(0); }

  /* Spin button */
  .spin-btn {
    position: relative;
    background: linear-gradient(135deg, #FFE566, var(--gold), #E6A800);
    color: var(--red-dark); border: none; border-radius: 50px;
    padding: 16px 48px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 18px; font-weight: 800; letter-spacing: 1px;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 0 var(--gold-dark), 0 8px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.4);
    overflow: hidden;
  }
  .spin-btn::before {
    content: ''; position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: left 0.5s;
  }
  .spin-btn:hover::before { left: 100%; }
  .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--gold-dark), 0 12px 28px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.4); }
  .spin-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--gold-dark), 0 4px 12px rgba(0,0,0,0.3); }
  .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* History */
  .history-wrap { width: min(360px, 90vw); text-align: center; }
  .history-title {
    font-size: 11px; font-weight: 700; letter-spacing: 4px;
    text-transform: uppercase; color: rgba(255,215,0,0.4); margin-bottom: 10px;
  }
  .history-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; min-height: 36px; }
  .history-chip {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,215,0,0.2);
    border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: 700;
    color: rgba(255,215,0,0.7); font-variant-numeric: tabular-nums;
    animation: chipIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes chipIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .history-empty { font-size: 12px; color: rgba(255,255,255,0.2); font-style: italic; align-self: center; }

  /* Confetti */
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
  .conf-piece { position: absolute; opacity: 0; }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .blessing {
    font-size: 12px; color: rgba(255,215,0,0.5); text-align: center;
    letter-spacing: 2px; font-style: italic; padding: 0 16px;
  }
</style>
</head>
<body>

<div class="lanterns">
  <div class="lantern"><div class="lantern-string"></div><div class="lantern-body"></div><div class="lantern-tassel"></div></div>
  <div class="lantern"><div class="lantern-string"></div><div class="lantern-body"></div><div class="lantern-tassel"></div></div>
  <div class="lantern"><div class="lantern-string"></div><div class="lantern-body"></div><div class="lantern-tassel"></div></div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<div class="container">

  <div class="title-block">
    <div class="title-sub">✦ Chúc Mừng Năm Mới ✦</div>
    <div class="title-main">
      <span>🧧</span><span>Lì</span><span> Xì</span><span> 🧧</span>
    </div>
  </div>

  <div class="envelope-wrap" onclick="triggerSpin()">
    <div class="envelope" id="envelope">
      <div class="envelope-front">
        <div class="env-corner tl"></div>
        <div class="env-corner tr"></div>
        <div class="env-corner bl"></div>
        <div class="env-corner br"></div>
        <div class="envelope-symbol">福</div>
      </div>
    </div>
  </div>

  <div class="result-wrap">
    <div class="result-label" id="resultLabel">SỐ LÌ XÌ CỦA BẠN</div>
    <div class="result-rolling" id="resultRolling">--</div>
    <div class="result-number" id="resultNumber"></div>
    <div class="result-message" id="resultMessage"></div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="triggerSpin()">
    🎲 Quay Số May Mắn
  </button>

  <div class="history-wrap">
    <div class="history-title">Lịch sử quay</div>
    <div class="history-list" id="historyList">
      <span class="history-empty">Chưa có lượt quay nào...</span>
    </div>
  </div>

  <div class="blessing">✦ Vạn sự như ý · Phú quý bình an · Tiền vào như nước ✦</div>

</div>

<script>
  // ===== CÀI ĐẶT (chỉ dành cho admin) =====
  const MIN_AMOUNT = 10000;   // Số tiền tối thiểu (đồng)
  const MAX_AMOUNT = 500000;  // Số tiền tối đa (đồng)
  const STEP = 10000;         // Bước nhảy
  // ==========================================

  // Falling petals
  const petals = ['🌸', '✨', '🌺', '⭐', '💛', '🏮'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petals[Math.floor(Math.random() * petals.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (4 + Math.random() * 6) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.fontSize = (10 + Math.random() * 14) + 'px';
    document.body.appendChild(p);
  }

  function getMessage(n) {
    if (n >= 500000) return '🤑 Wow! Lì xì siêu to khổng lồ!';
    if (n >= 200000) return '🎊 Tuyệt vời! Năm nay phát tài rồi!';
    if (n >= 100000) return '😄 Năm mới vui vẻ, thịnh vượng!';
    if (n >= 50000)  return '🌟 Chúc bạn năm mới may mắn!';
    return '🧧 Lì xì lấy may, năm mới phúc lộc!';
  }

  function fireConfetti() {
    const container = document.getElementById('confettiContainer');
    container.innerHTML = '';
    const colors = ['#FFD700','#FF6B6B','#FF4444','#FFF0A0','#FF8C00','#FFEC00'];
    const shapes = ['■','●','▲','◆','★'];
    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'conf-piece';
      piece.textContent = shapes[Math.floor(Math.random() * shapes.length)];
      piece.style.color = colors[Math.floor(Math.random() * colors.length)];
      piece.style.left = (20 + Math.random() * 60) + 'vw';
      piece.style.top = '40vh';
      piece.style.fontSize = (8 + Math.random() * 12) + 'px';
      piece.style.animation = `confettiFall ${1 + Math.random() * 1.5}s ease-out forwards`;
      piece.style.animationDelay = (Math.random() * 0.4) + 's';
      container.appendChild(piece);
    }
    setTimeout(() => container.innerHTML = '', 3000);
  }

  let spinHistory = [];
  function addHistory(n) {
    spinHistory.unshift(n);
    if (spinHistory.length > 8) spinHistory.pop();
    document.getElementById('historyList').innerHTML = spinHistory.map(v =>
      `<span class="history-chip">${v.toLocaleString('vi-VN')}đ</span>`
    ).join('');
  }

  let spinning = false;

  function triggerSpin() {
    if (spinning) return;
    spinning = true;

    const btn = document.getElementById('spinBtn');
    const envelope = document.getElementById('envelope');
    const resultLabel = document.getElementById('resultLabel');
    const resultNumber = document.getElementById('resultNumber');
    const resultRolling = document.getElementById('resultRolling');
    const resultMessage = document.getElementById('resultMessage');

    btn.disabled = true;

    envelope.classList.add('shake');
    setTimeout(() => envelope.classList.remove('shake'), 500);

    resultNumber.classList.remove('show');
    resultMessage.classList.remove('show');
    resultLabel.classList.remove('show');

    resultRolling.style.display = 'block';
    resultRolling.classList.add('active');

    let rollCount = 0;
    const rollInterval = setInterval(() => {
      const fake = Math.floor(Math.random() * (MAX_AMOUNT - MIN_AMOUNT + 1)) + MIN_AMOUNT;
      resultRolling.textContent = (Math.round(fake / STEP) * STEP).toLocaleString('vi-VN') + 'đ';
      rollCount++;
      if (rollCount >= 18) {
        clearInterval(rollInterval);
        const finalRaw = Math.floor(Math.random() * (MAX_AMOUNT - MIN_AMOUNT + 1)) + MIN_AMOUNT;
        const final = Math.round(finalRaw / STEP) * STEP;

        resultRolling.classList.remove('active');
        resultRolling.style.display = 'none';
        resultNumber.textContent = final.toLocaleString('vi-VN') + 'đ';
        resultLabel.classList.add('show');

        setTimeout(() => {
          resultNumber.classList.add('show');
          resultMessage.textContent = getMessage(final);
          resultMessage.classList.add('show');
          fireConfetti();
          addHistory(final);
          spinning = false;
          btn.disabled = false;
        }, 100);
      }
    }, 80);
  }
</script>
</body>
</html>
